[build]
  command = "npm run build"
  publish = "dist"

# Vite 8 требует Node ^20.19 || >=22.12. Без явного пина Netlify может взять
# Node 18 по умолчанию → сборка упадёт. Закрепляем 22 (LTS).
[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/*"
  to = "https://miyzamchi-backend.onrender.com/:splat"
  status = 200
  force = true
