<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мыйзамчы AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:   #0069ff;
      --accent2:  #0052cc;
      --bg:       #f4f6fa;
      --surf:     #ffffff;
      --border:   #e0e4ed;
      --text:     #1a1a2e;
      --muted:    #6b7280;
      --success:  #16a34a;
      --warn:     #d97706;
      --danger:   #dc2626;
      --radius:   8px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Layout ── */
    .plugin-root {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--accent);
      color: #fff;
      flex-shrink: 0;
    }
    .header-logo { font-size: 18px; }
    .header-title { font-weight: 700; font-size: 14px; line-height: 1.2; }
    .header-sub { font-size: 10px; opacity: 0.8; }

    /* ── Mode tabs ── */
    .mode-tabs {
      display: flex;
      background: var(--surf);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .mode-tab {
      flex: 1;
      padding: 7px 4px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .mode-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .mode-tab:hover:not(.active) { color: var(--text); }

    /* ── Selection box ── */
    .section { padding: 8px 12px; }
    .label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .selection-box {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 8px;
      min-height: 36px;
      max-height: 64px;
      overflow-y: auto;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      word-break: break-word;
    }

    /* ── Query input ── */
    .query-wrap {
      padding: 0 12px 8px;
      flex-shrink: 0;
    }
    textarea.query-input {
      width: 100%;
      min-height: 56px;
      max-height: 100px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      resize: none;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      background: var(--surf);
      outline: none;
      line-height: 1.4;
      transition: border-color 0.15s;
    }
    textarea.query-input:focus { border-color: var(--accent); }

    /* ── Buttons row ── */
    .btn-row {
      display: flex;
      gap: 6px;
      padding: 0 12px 10px;
      flex-shrink: 0;
    }
    .btn {
      flex: 1;
      padding: 7px 8px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary  { background: var(--accent);  color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent2); }
    .btn-outline  { background: none; color: var(--accent); border: 1px solid var(--accent); }
    .btn-sm       { flex: none; font-size: 11px; padding: 5px 8px; }
    .btn-danger   { background: none; color: var(--danger); border: 1px solid var(--danger); }

    /* ── Step line ── */
    .step-line {
      padding: 0 12px 4px;
      font-size: 11px;
      color: var(--accent);
      min-height: 16px;
      flex-shrink: 0;
    }

    /* ── Spinner ── */
    .spinner-wrap {
      display: none;
      padding: 0 12px 6px;
      flex-shrink: 0;
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #ddd;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result area ── */
    .result-wrap {
      flex: 1;
      overflow: hidden;
      padding: 0 12px 4px;
      display: flex;
      flex-direction: column;
    }
    .result {
      flex: 1;
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    /* ── Sources ── */
    .sources {
      padding: 4px 12px;
      min-height: 20px;
      flex-shrink: 0;
      line-height: 1.5;
    }

    /* ── Action buttons (появляются после ответа) ── */
    .actions {
      display: none;
      gap: 6px;
      padding: 6px 12px 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .action-label {
      width: 100%;
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 8px;
      left: 12px; right: 12px;
      background: #1a1a2e;
      color: #fff;
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: 999;
      text-align: center;
    }

    /* ── Divider ── */
    hr { border: none; border-top: 1px solid var(--border); margin: 0 12px; }
  </style>
</head>
<body>
<div class="plugin-root">

  <!-- Header -->
  <div class="header">
    <span class="header-logo">⚖</span>
    <div>
      <div class="header-title">Мыйзамчы AI</div>
      <div class="header-sub">Юридический ассистент КР</div>
    </div>
  </div>

  <!-- Mode tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="consult">💬 Консультация</button>
    <button class="mode-tab" data-mode="analyze">🔍 Аудит</button>
    <button class="mode-tab" data-mode="agent">✏ Агент</button>
  </div>

  <!-- Selected text -->
  <div class="section">
    <div class="label">Выделенный текст</div>
    <div class="selection-box" id="selection-box">(нет выделения)</div>
  </div>

  <hr>

  <!-- Query input -->
  <div class="query-wrap" style="padding-top:8px">
    <div class="label" style="padding-left:0;margin-bottom:4px">Вопрос или задача</div>
    <textarea
      id="query-input"
      class="query-input"
      placeholder="Задайте вопрос по праву КР…"></textarea>
  </div>

  <!-- Send / Stop buttons -->
  <div class="btn-row">
    <button id="send-btn" class="btn btn-primary">Отправить</button>
    <button id="analyze-doc-btn" class="btn btn-outline btn-sm">📄 Весь документ</button>
    <button id="stop-btn" class="btn btn-danger btn-sm">⛔</button>
  </div>

  <!-- Step indicator -->
  <div class="step-line" id="step-line"></div>

  <!-- Spinner -->
  <div class="spinner-wrap" id="spinner">
    <span class="spinner"></span>
    <span style="font-size:12px;color:var(--muted)">Анализирую…</span>
  </div>

  <!-- Result -->
  <div class="result-wrap">
    <div class="label">Ответ</div>
    <div class="result" id="result"></div>
  </div>

  <!-- Sources -->
  <div class="sources" id="sources"></div>

  <!-- Action buttons -->
  <div class="actions" id="actions">
    <span class="action-label">Применить ответ:</span>
    <button id="insert-btn"  class="btn btn-primary btn-sm">✏ Заменить текст</button>
    <button id="comment-btn" class="btn btn-outline btn-sm">💬 Добавить комментарий</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

</div>

<script src="plugin.js"></script>
</body>
</html>
